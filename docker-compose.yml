services:
  mysql:
    image: ${MYSQL_IMAGE:-registry.cn-guangzhou.aliyuncs.com/joe/mysql:lts}
    container_name: pm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-project_management}
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      args:
        GO_BUILDER_IMAGE: ${GO_BUILDER_IMAGE:-registry.cn-guangzhou.aliyuncs.com/joe/golang:1.25-alpine}
        APP_RUNTIME_IMAGE: ${APP_RUNTIME_IMAGE:-registry.cn-guangzhou.aliyuncs.com/joe/alpine:latest}
        GO_PROXY: ${GO_PROXY:-${GOPROXY:-https://goproxy.cn,direct}}
        GOPROXY: ${GOPROXY:-${GO_PROXY:-https://goproxy.cn,direct}}
    container_name: pm-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_PORT: ${APP_PORT:-8080}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5173},https://localhost:${FRONTEND_HTTPS_PORT:-5443}
      UPLOAD_DIR: /app/static/uploads
      UPLOAD_PUBLIC_BASE: ${UPLOAD_PUBLIC_BASE:-/static/uploads}
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-project_management}
      # AI 助理（洞察分析 → AI 助理）；三者同时非空才启用，否则回退内置模板
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-30}
      # 挂载的 system prompt 目录；文件缺失或为空时回退代码内置默认提示词
      AI_PROMPT_DIR: ${AI_PROMPT_DIR:-/app/prompts}
    ports:
      - '${BACKEND_PORT:-8080}:${APP_PORT:-8080}'
    volumes:
      - './static/uploads:/app/static/uploads'
      - './prompts:/app/prompts:ro'

  frontend:
    build:
      context: ./frontend
      args:
        NODE_BUILDER_IMAGE: ${NODE_BUILDER_IMAGE:-registry.cn-guangzhou.aliyuncs.com/joe/node:24-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-registry.cn-guangzhou.aliyuncs.com/joe/nginx:alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_AI_ASSISTANT_TIMEOUT_MS: ${VITE_AI_ASSISTANT_TIMEOUT_MS:-35000}
    container_name: pm-frontend
    depends_on:
      - backend
    environment:
      FRONTEND_SSL_CERT_FILE: ${FRONTEND_SSL_CERT_FILE:-fullchain.pem}
      FRONTEND_SSL_KEY_FILE: ${FRONTEND_SSL_KEY_FILE:-privkey.pem}
    ports:
      - '${FRONTEND_PORT:-5173}:80'
      - '${FRONTEND_HTTPS_PORT:-5443}:443'
    volumes:
      - '${FRONTEND_SSL_DIR:-./deploy/ssl}:/etc/nginx/ssl:ro'

volumes:
  mysql_data:

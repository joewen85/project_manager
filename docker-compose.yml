services:
  mysql:
    image: ${MYSQL_IMAGE:-registry.cn-guangzhou.aliyuncs.com/joe/mysql:lts}
    container_name: pm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-project_management}
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      args:
        GO_BUILDER_IMAGE: ${GO_BUILDER_IMAGE:-golang:1.23-alpine}
        APP_RUNTIME_IMAGE: ${APP_RUNTIME_IMAGE:-alpine:3.20}
        GO_PROXY: ${GO_PROXY:-https://goproxy.cn,direct}
    container_name: pm-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_PORT: ${APP_PORT:-8080}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-project_management}
    ports:
      - '${BACKEND_PORT:-8080}:${APP_PORT:-8080}'

  frontend:
    build:
      context: ./frontend
      args:
        NODE_BUILDER_IMAGE: ${NODE_BUILDER_IMAGE:-node:22-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-registry.cn-guangzhou.aliyuncs.com/joe/nginx:alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: pm-frontend
    depends_on:
      - backend
    ports:
      - '${FRONTEND_PORT:-5173}:80'

volumes:
  mysql_data:

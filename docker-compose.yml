services:
  mysql:
    image: mysql:8.4
    container_name: pm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: project_management
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: pm-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_PORT: 8080
      JWT_SECRET: change-me
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: project_management
    ports:
      - '8080:8080'

  frontend:
    build: ./frontend
    container_name: pm-frontend
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  mysql_data:

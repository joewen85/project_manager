components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdPath:
      in: path
      name: id
      required: true
      schema:
        type: integer
    Page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
    PageSize:
      in: query
      name: pageSize
      schema:
        type: integer
        minimum: 1
        maximum: 100
    Keyword:
      in: query
      name: keyword
      schema:
        type: string
  schemas:
    ApiMessage:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
    LoginRequest:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
        password:
          type: string
    ChangePasswordRequest:
      type: object
      required:
      - oldPassword
      - newPassword
      - confirmPassword
      properties:
        oldPassword:
          type: string
          description: 旧密码
        newPassword:
          type: string
          minLength: 6
          description: 新密码（至少 6 位）
        confirmPassword:
          type: string
          description: 确认新密码
    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
        permissions:
          type: array
          items:
            type: string
    Attachment:
      type: object
      properties:
        fileName:
          type: string
        filePath:
          type: string
        relativePath:
          type: string
        fileSize:
          type: integer
          format: int64
        mimeType:
          type: string
    UploadResponse:
      type: object
      properties:
        attachments:
          type: array
          description: 附件数组（attachments[]）
          items:
            $ref: '#/components/schemas/Attachment'
        attachment:
          allOf:
          - $ref: '#/components/schemas/Attachment'
          deprecated: true
          description: 兼容单文件返回字段（仅上传 1 个文件时存在）
    Permission:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        description:
          type: string
    PermissionUpsertRequest:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
    Role:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
    RoleUpsertRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        permissionIds:
          type: array
          items:
            type: integer
    DepartmentLite:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
    UserLite:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        name:
          type: string
        email:
          type: string
    Department:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserLite'
    Tag:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        taskCount:
          type: integer
          format: int64
    TagUpsertRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
    DepartmentUpsertRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        userIds:
          type: array
          items:
            type: integer
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        name:
          type: string
        email:
          type: string
        isActive:
          type: boolean
        weeklyCapacityHours:
          type: number
          format: double
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        departments:
          type: array
          items:
            $ref: '#/components/schemas/DepartmentLite'
    UserUpsertRequest:
      type: object
      properties:
        username:
          type: string
        name:
          type: string
        email:
          type: string
        password:
          type: string
        isActive:
          type: boolean
        weeklyCapacityHours:
          type: number
          format: double
          minimum: 0
          maximum: 168
        roleIds:
          type: array
          items:
            type: integer
        departmentIds:
          type: array
          items:
            type: integer
    TaskDependency:

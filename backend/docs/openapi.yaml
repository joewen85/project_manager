openapi: 3.0.3
info:
  title: Project Management API
  version: 0.1.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
- url: /api/v1
security:
- bearerAuth: []
paths:
  /auth/login:
    post:
      summary: 用户登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: postAuthLogin
  /auth/profile:
    get:
      summary: 当前用户信息
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getAuthProfile
  /auth/change-password:
    post:
      summary: 修改当前用户密码
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: postAuthChangePassword
  /uploads:
    post:
      summary: 上传附件（支持多文件/文件夹）
      description: 'multipart/form-data 上传。推荐使用 files 字段（可多文件）； 兼容 file 单文件字段。前端可通过 webkitdirectory 或拖放目录上传；目录上传会自动压缩为 ZIP。

        '
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: 多文件上传字段（files[]）
                relativePaths:
                  type: array
                  items:
                    type: string
                  description: 与 files[] 一一对应的相对路径，用于目录上传与后端按目录打包 ZIP
                file:
                  type: string
                  format: binary
                  deprecated: true
                  description: 兼容单文件上传字段
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: postUploads
  /rbac/permissions:
    get:
      summary: 权限列表
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Permission'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getRbacPermissions
    post:
      summary: 创建权限
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PermissionUpsertRequest'
      responses:
        '201':
          description: Created
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: postRbacPermissions
  /rbac/permissions/{id}:
    put:
      summary: 更新权限
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PermissionUpsertRequest'
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: putRbacPermissionsById
    delete:
      summary: 删除权限
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: deleteRbacPermissionsById
  /rbac/roles:
    get:
      summary: 角色列表
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getRbacRoles
    post:
      summary: 创建角色
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleUpsertRequest'
      responses:
        '201':
          description: Created
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: postRbacRoles
  /rbac/roles/{id}:
    put:
      summary: 更新角色
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleUpsertRequest'
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: putRbacRolesById
    delete:
      summary: 删除角色
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: deleteRbacRolesById
  /users:
    get:
      summary: 用户列表
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - $ref: '#/components/parameters/Keyword'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPageResult'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getUsers
    post:
      summary: 创建用户
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpsertRequest'
      responses:
        '201':
          description: Created
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: postUsers
  /users/{id}:
    put:
      summary: 更新用户
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpsertRequest'
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: putUsersById
    delete:
      summary: 删除用户
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: deleteUsersById
  /departments:
    get:
      summary: 部门列表
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - $ref: '#/components/parameters/Keyword'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartmentPageResult'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getDepartments
    post:
      summary: 创建部门
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentUpsertRequest'
      responses:
        '201':
          description: Created
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: postDepartments
  /departments/{id}:
    put:
      summary: 更新部门
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentUpsertRequest'
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: putDepartmentsById
    delete:
      summary: 删除部门
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: deleteDepartmentsById
  /tags:
    get:
      summary: 标签列表
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - $ref: '#/components/parameters/Keyword'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagPageResult'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getTags
    post:
      summary: 创建标签
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagUpsertRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: postTags
  /tags/{id}:
    get:
      summary: 标签详情
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getTagsById
    put:
      summary: 更新标签
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagUpsertRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: putTagsById
    delete:
      summary: 删除标签
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: deleteTagsById
  /projects:
    get:
      summary: 项目列表
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - $ref: '#/components/parameters/Keyword'
      - in: query
        name: searchFields
        schema:
          type: string
        description: 逗号分隔的搜索字段列表，支持 code,name,description
      - in: query
        name: sortBy
        schema:
          type: string
          enum:
          - code
          - name
          - startAt
          - endAt
          - createdAt
      - in: query
        name: sortOrder
        schema:
          type: string
          enum:
          - asc
          - desc
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectPageResult'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getProjects
    post:
      summary: 创建项目
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpsertRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: postProjects
  /projects/export:
    get:
      summary: 导出项目 CSV
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Keyword'
      responses:
        '200':
          description: CSV
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getProjectsExport
  /projects/editor-options:
    get:
      summary: 项目编辑选项（负责人/部门）
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Keyword'
      - in: query
        name: userKeyword
        schema:
          type: string
      - in: query
        name: departmentKeyword
        schema:
          type: string
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEditorOptionsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getProjectsEditorOptions
  /projects/gantt-portfolio:
    get:
      summary: 项目集甘特图数据
      security:
      - bearerAuth: []
      parameters:
      - in: query
        name: projectIds
        description: 逗号分隔项目 ID 列表
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GanttItem'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getProjectsGanttPortfolio
  /projects/{id}:
    get:
      summary: 项目详情
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getProjectsById
    put:
      summary: 更新项目
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpsertRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: putProjectsById
    delete:
      summary: 删除项目
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: deleteProjectsById
  /projects/{id}/gantt:
    get:
      summary: 单项目甘特图数据
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GanttItem'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getProjectsByIdGantt
  /projects/{id}/gantt/auto-resolve:
    post:
      summary: 自动按依赖顺延任务计划
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoResolveResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: postProjectsByIdGanttAutoResolve
  /projects/{id}/task-tree:
    get:
      summary: 项目任务树
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskTreeNode'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getProjectsByIdTaskTree
  /tasks:
    get:
      summary: 任务列表
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - $ref: '#/components/parameters/Keyword'
      - in: query
        name: searchFields
        schema:
          type: string
        description: 逗号分隔的搜索字段列表
      - in: query
        name: status
        schema:
          type: string
          enum:
          - pending
          - queued
          - processing
          - completed
      - in: query
        name: statuses
        schema:
          type: string
        description: 逗号分隔的状态列表
      - in: query
        name: priorities
        schema:
          type: string
        description: 逗号分隔的优先级列表
      - in: query
        name: assigneeIds
        schema:
          type: string
        description: 逗号分隔的执行人 ID 列表
      - in: query
        name: projectId
        schema:
          type: integer
      - in: query
        name: sortBy
        schema:
          type: string
          enum:
          - taskNo
          - title
          - status
          - progress
          - startAt
          - endAt
          - createdAt
          - priority
      - in: query
        name: sortOrder
        schema:
          type: string
          description: priority 排序时支持 high|medium|low
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskPageResult'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getTasks
    post:
      summary: 创建任务
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpsertRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: postTasks
  /tasks/export:
    get:
      summary: 导出任务 CSV
      security:
      - bearerAuth: []
      parameters:
      - in: query
        name: projectId
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
      - $ref: '#/components/parameters/Keyword'
      responses:
        '200':
          description: CSV
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getTasksExport
  /tasks/assignee-options:
    get:
      summary: 任务执行人选项
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Keyword'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAssigneeOptionsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getTasksAssigneeOptions
  /tasks/{id}:
    put:
      summary: 更新任务
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpsertRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: putTasksById
    delete:
      summary: 删除任务
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: deleteTasksById
  /tasks/{id}/dependencies:
    put:
      summary: 更新任务依赖
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskDependenciesUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskDependenciesUpdateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: putTasksByIdDependencies
  /tasks/{id}/schedule:
    patch:
      summary: 更新任务计划时间
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      - in: query
        name: autoResolve
        description: false 时不触发自动顺延（默认 true）
        schema:
          type: boolean
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskScheduleUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskScheduleUpdateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: patchTasksByIdSchedule
  /tasks/progress-list:
    get:
      summary: 任务进度列表
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProgressItem'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getTasksProgressList
  /tasks/me:
    get:
      summary: 我的任务聚合
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyTasksResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getTasksMe
  /stats/dashboard:
    get:
      summary: 仪表盘统计
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStatsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getStatsDashboard
  /notifications:
    get:
      summary: 通知列表
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - in: query
        name: isRead
        schema:
          type: boolean
      - in: query
        name: module
        schema:
          type: string
      - $ref: '#/components/parameters/Keyword'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPageResult'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getNotifications
  /notifications/unread-count:
    get:
      summary: 未读通知数量
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadCountResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getNotificationsUnreadCount
  /notifications/{id}/read:
    patch:
      summary: 标记单条通知已读
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: patchNotificationsByIdRead
  /notifications/read-all:
    patch:
      summary: 标记全部通知已读
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: patchNotificationsReadAll
  /audit/logs:
    get:
      summary: 审计日志列表
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - in: query
        name: module
        schema:
          type: string
      - in: query
        name: action
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogPageResult'
        '400':
          $ref: '#/components/responses/BadRequest'
      operationId: getAuditLogs
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdPath:
      in: path
      name: id
      required: true
      schema:
        type: integer
    Page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
    PageSize:
      in: query
      name: pageSize
      schema:
        type: integer
        minimum: 1
        maximum: 100
    Keyword:
      in: query
      name: keyword
      schema:
        type: string
  schemas:
    ApiMessage:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
    LoginRequest:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
        password:
          type: string
    ChangePasswordRequest:
      type: object
      required:
      - oldPassword
      - newPassword
      - confirmPassword
      properties:
        oldPassword:
          type: string
          description: 旧密码
        newPassword:
          type: string
          minLength: 6
          description: 新密码（至少 6 位）
        confirmPassword:
          type: string
          description: 确认新密码
    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
        permissions:
          type: array
          items:
            type: string
    Attachment:
      type: object
      properties:
        fileName:
          type: string
        filePath:
          type: string
        relativePath:
          type: string
        fileSize:
          type: integer
          format: int64
        mimeType:
          type: string
    UploadResponse:
      type: object
      properties:
        attachments:
          type: array
          description: 附件数组（attachments[]）
          items:
            $ref: '#/components/schemas/Attachment'
        attachment:
          allOf:
          - $ref: '#/components/schemas/Attachment'
          deprecated: true
          description: 兼容单文件返回字段（仅上传 1 个文件时存在）
    Permission:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        description:
          type: string

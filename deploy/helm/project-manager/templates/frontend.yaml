apiVersion: apps/v1
kind: Deployment
metadata:
  name: pm-frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels: { app: pm-frontend }
  template:
    metadata:
      labels: { app: pm-frontend }
    spec:
      containers:
        - name: frontend
          image: {{ .Values.frontend.image }}
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: pm-frontend
spec:
  type: LoadBalancer
  selector: { app: pm-frontend }
  ports:
    - port: {{ .Values.frontend.servicePort }}
      targetPort: 80
